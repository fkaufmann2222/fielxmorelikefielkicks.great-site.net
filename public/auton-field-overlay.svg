<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" height="100%">
    <defs>
        <!-- Field Floor Gradient -->
        <radialGradient id="floor" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#444446"/>
            <stop offset="100%" stop-color="#2a2a2c"/>
        </radialGradient>

        <!-- Base Hexagon Polygon (Pointy-topped) -->
        <polygon id="hex" points="0,-75 64.9,-37.5 64.9,37.5 0,75 -64.9,37.5 -64.9,-37.5" />
        <polygon id="small-hex" points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20" />

        <!-- Green Ball Gradient -->
        <radialGradient id="green-ball" cx="40%" cy="30%" r="60%">
            <stop offset="0%" stop-color="#55ff55"/>
            <stop offset="50%" stop-color="#11cc44"/>
            <stop offset="100%" stop-color="#006611"/>
        </radialGradient>

        <!-- Green Pod Gradient -->
        <radialGradient id="green-pod" cx="30%" cy="30%" r="60%">
            <stop offset="0%" stop-color="#88ff88"/>
            <stop offset="60%" stop-color="#2ecc71"/>
            <stop offset="100%" stop-color="#008822"/>
        </radialGradient>

        <!-- Metallic Gradient for Ramps -->
        <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#777"/>
            <stop offset="20%" stop-color="#ddd"/>
            <stop offset="80%" stop-color="#aaa"/>
            <stop offset="100%" stop-color="#555"/>
        </linearGradient>

        <!-- Drop Shadows for 3D elements -->
        <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
        </filter>
        <filter id="small-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
        </filter>

        <!-- Reusable Pod -->
        <g id="pod" filter="url(#small-shadow)">
            <circle cx="0" cy="0" r="10" fill="url(#green-pod)"/>
            <circle cx="0" cy="0" r="3.5" fill="#cc00ff"/>
        </g>
    </defs>

    <!-- Overall Background -->
    <rect width="1200" height="700" fill="#f8f9fa" />

    <!-- Dark Field Floor -->
    <rect x="40" y="50" width="1120" height="500" fill="url(#floor)" />

    <!-- Field Boundary Ticks & Electronic Lines -->
    <line x1="220" y1="80" x2="220" y2="50" stroke="#1e54c9" stroke-width="4" />
    <line x1="980" y1="80" x2="980" y2="50" stroke="#d11f1f" stroke-width="4" />
    <line x1="220" y1="520" x2="220" y2="550" stroke="#1e54c9" stroke-width="4" />
    <line x1="980" y1="520" x2="980" y2="550" stroke="#d11f1f" stroke-width="4" />

    <polyline points="640,80 640,55 720,55 720,80" fill="none" stroke="#1e54c9" stroke-width="3"/>
    <polyline points="480,520 480,545 560,545 560,520" fill="none" stroke="#d11f1f" stroke-width="3"/>

    <!-- Electronics Boxes -->
    <g filter="url(#small-shadow)">
        <rect x="645" y="52" width="65" height="26" fill="#d0d0d0" rx="3" stroke="#888" stroke-width="1"/>
        <circle cx="660" cy="65" r="5" fill="#fff" />
        <circle cx="695" cy="65" r="5" fill="#fff" />

        <rect x="485" y="522" width="65" height="26" fill="#d0d0d0" rx="3" stroke="#888" stroke-width="1"/>
        <circle cx="500" cy="535" r="5" fill="#fff" />
        <circle cx="535" cy="535" r="5" fill="#fff" />
    </g>

    <!-- Field External White Lines -->
    <g stroke="#ffffff" stroke-width="3" fill="none">
        <line x1="40" y1="180" x2="120" y2="180" />
        <line x1="40" y1="420" x2="120" y2="420" />
        <line x1="1080" y1="180" x2="1160" y2="180" />
        <line x1="1080" y1="420" x2="1160" y2="420" />
    </g>

    <!-- Main Field Perimeter Boundary -->
    <polygon points="220,80 980,80 1080,180 1080,420 980,520 220,520 120,420 120,180" fill="none" stroke="#ffffff" stroke-width="4"/>

    <!-- Center Line -->
    <line x1="600" y1="80" x2="600" y2="520" stroke="#ffffff" stroke-width="2" />

    <!-- Gate Labels and Yellow Markers -->
    <!-- Top Left -->
    <rect x="365" y="82" width="20" height="6" fill="#fffb00" />
    <rect x="415" y="82" width="20" height="6" fill="#fffb00" />
    <rect x="368" y="55" width="64" height="20" fill="#ffffff" stroke="#ff00ff" stroke-width="2" />
    <text x="400" y="70" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Gate</text>

    <!-- Top Right -->
    <rect x="765" y="82" width="20" height="6" fill="#fffb00" />
    <rect x="815" y="82" width="20" height="6" fill="#fffb00" />
    <rect x="768" y="55" width="64" height="20" fill="#ffffff" stroke="#ff00ff" stroke-width="2" />
    <text x="800" y="70" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Gate</text>

    <!-- Bottom Left -->
    <rect x="365" y="512" width="20" height="6" fill="#fffb00" />
    <rect x="415" y="512" width="20" height="6" fill="#fffb00" />
    <rect x="368" y="525" width="64" height="20" fill="#ffffff" stroke="#ff00ff" stroke-width="2" />
    <text x="400" y="540" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Gate</text>

    <!-- Bottom Right -->
    <rect x="765" y="512" width="20" height="6" fill="#fffb00" />
    <rect x="815" y="512" width="20" height="6" fill="#fffb00" />
    <rect x="768" y="525" width="64" height="20" fill="#ffffff" stroke="#ff00ff" stroke-width="2" />
    <text x="800" y="540" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Gate</text>

    <!-- Corner Deflectors -->
    <polygon points="122,182 222,82 236,96 136,196" fill="#888" stroke="#333" stroke-width="2" />
    <polygon points="1078,182 978,82 964,96 1064,196" fill="#888" stroke="#333" stroke-width="2" />
    <polygon points="1078,418 978,518 964,504 1064,404" fill="#888" stroke="#333" stroke-width="2" />
    <polygon points="122,418 222,518 236,504 136,404" fill="#888" stroke="#333" stroke-width="2" />

    <!-- Side Wall Ramps -->
    <polygon points="122,230 150,260 150,340 122,370" fill="#666" stroke="#444" stroke-width="2" />
    <polygon points="1078,230 1050,260 1050,340 1078,370" fill="#666" stroke="#444" stroke-width="2" />

    <!-- Main Field Elements (Shadowed) -->
    <g filter="url(#drop-shadow)">
        <!-- Green Balls (Left Side) -->
        <circle cx="220" cy="190" r="12" fill="url(#green-ball)" />
        <circle cx="220" cy="300" r="12" fill="url(#green-ball)" />
        <circle cx="220" cy="410" r="12" fill="url(#green-ball)" />

        <!-- Green Balls (Right Side) -->
        <circle cx="980" cy="190" r="12" fill="url(#green-ball)" />
        <circle cx="980" cy="300" r="12" fill="url(#green-ball)" />
        <circle cx="980" cy="410" r="12" fill="url(#green-ball)" />

        <!-- Left Hexagon Base -->
        <use href="#hex" x="340" y="300" fill="#3a3a3e" stroke="#1e54c9" stroke-width="4" />
        <use href="#small-hex" x="340" y="300" fill="#555" />
        <circle cx="340" cy="300" r="16" fill="#1e54c9" />

        <!-- Right Hexagon Base -->
        <use href="#hex" x="860" y="300" fill="#3a3a3e" stroke="#d11f1f" stroke-width="4" />
        <use href="#small-hex" x="860" y="300" fill="#555" />
        <circle cx="860" cy="300" r="16" fill="#d11f1f" />

        <!-- Center Ramps Framework (Blue Box & Red Box Outlines) -->
        <rect x="550" y="75" width="100" height="215" fill="none" stroke="#1e54c9" stroke-width="3" />
        <rect x="550" y="310" width="100" height="215" fill="none" stroke="#d11f1f" stroke-width="3" />

        <!-- Top Ramp Structure -->
        <rect x="565" y="80" width="70" height="205" fill="#222" />
        <rect x="565" y="80" width="8" height="205" fill="url(#metal)" />
        <rect x="627" y="80" width="8" height="205" fill="url(#metal)" />
        <rect x="578" y="95" width="44" height="175" fill="#444" />
        <!-- Top Ramp White Ends -->
        <rect x="565" y="80" width="70" height="15" fill="#e8e8e8" />
        <rect x="565" y="270" width="70" height="15" fill="#e8e8e8" />

        <!-- Center Bridge Link -->
        <rect x="575" y="290" width="50" height="20" fill="#e8e8e8" />

        <!-- Bottom Ramp Structure -->
        <rect x="565" y="315" width="70" height="205" fill="#222" />
        <rect x="565" y="315" width="8" height="205" fill="url(#metal)" />
        <rect x="627" y="315" width="8" height="205" fill="url(#metal)" />
        <rect x="578" y="330" width="44" height="175" fill="#444" />
        <!-- Bottom Ramp White Ends -->
        <rect x="565" y="315" width="70" height="15" fill="#e8e8e8" />
        <rect x="565" y="505" width="70" height="15" fill="#e8e8e8" />
    </g>

    <!-- Left Hexagon Pods -->
    <use href="#pod" x="340" y="272" />      <!-- Top -->
    <use href="#pod" x="364.2" y="286" />    <!-- Top-Right -->
    <use href="#pod" x="364.2" y="314" />    <!-- Bottom-Right -->
    <use href="#pod" x="340" y="328" />      <!-- Bottom -->
    <use href="#pod" x="315.8" y="314" />    <!-- Bottom-Left -->
    <use href="#pod" x="315.8" y="286" />    <!-- Top-Left -->

    <!-- Right Hexagon Pods -->
    <use href="#pod" x="860" y="272" />      <!-- Top -->
    <use href="#pod" x="884.2" y="286" />    <!-- Top-Right -->
    <use href="#pod" x="884.2" y="314" />    <!-- Bottom-Right -->
    <use href="#pod" x="860" y="328" />      <!-- Bottom -->
    <use href="#pod" x="835.8" y="314" />    <!-- Bottom-Left -->
    <use href="#pod" x="835.8" y="286" />    <!-- Top-Left -->

    <!-- Scoring Table Area -->
    <rect x="460" y="580" width="280" height="34" fill="#404040" stroke="#333" stroke-width="2"/>
    <text x="600" y="602" font-family="'Arial', sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">SCORING TABLE</text>
    <polygon points="505,593 490,593 490,588 475,597 490,606 490,601 505,601" fill="#1e54c9" />
    <polygon points="695,593 710,593 710,588 725,597 710,606 710,601 695,601" fill="#d11f1f" />

    <!-- SolidWorks Logo -->
    <g transform="translate(860, 580)">
        <text x="0" y="45" font-family="'Trebuchet MS', Arial, sans-serif" font-size="48" font-weight="bold" font-style="italic" fill="#d11f1f" letter-spacing="-2">3DS</text>
        <text x="95" y="42" font-family="'Arial', Helvetica, sans-serif" font-size="30" font-weight="900" fill="#d11f1f" letter-spacing="1">SOLIDWORKS</text>
        <text x="210" y="66" font-family="'Arial', sans-serif" font-size="15" font-weight="bold" fill="#cc3333" text-anchor="middle">Modeling Solutions Partner</text>
    </g>

</svg>