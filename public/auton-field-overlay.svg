<svg xmlns="http://www.w3.org/2000/svg" viewBox="-120 -80 1840 960" width="100%" height="100%">
    <defs>
        <!-- Yellow Ball Gradient and Pattern -->
        <radialGradient id="ballGrad" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#FFFF66" />
            <stop offset="60%" stop-color="#FFCC00" />
            <stop offset="100%" stop-color="#DDAA00" />
        </radialGradient>
        
        <pattern id="ballPattern" width="15" height="15" patternUnits="userSpaceOnUse">
            <circle cx="7.5" cy="7.5" r="6.5" fill="url(#ballGrad)" stroke="#B8860B" stroke-width="0.5" />
            <circle cx="5" cy="5" r="2" fill="#FFFFFF" opacity="0.5" />
        </pattern>

        <!-- Drop shadow for structures -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="2" dy="5" stdDeviation="4" flood-opacity="0.3"/>
        </filter>
    </defs>

    <!-- Outer Canvas Background (Workspace) -->
    <rect x="-120" y="-80" width="1840" height="960" fill="#F4F4F4" />

    <!-- Alliance Station Backgrounds (Gray areas outside field) -->
    <!-- Red Alliance Station -->
    <rect x="-100" y="0" width="100" height="800" fill="#E8E8E8" stroke="#AAAAAA" stroke-width="2" />
    <line x1="-100" y1="266" x2="0" y2="266" stroke="#AAAAAA" stroke-width="3" />
    <line x1="-100" y1="533" x2="0" y2="533" stroke="#AAAAAA" stroke-width="3" />
    
    <!-- Red Station Small Details/Connectors -->
    <rect x="-20" y="260" width="20" height="12" fill="#888888" />
    <rect x="-20" y="527" width="20" height="12" fill="#888888" />

    <!-- Blue Alliance Station -->
    <rect x="1600" y="0" width="100" height="800" fill="#E8E8E8" stroke="#AAAAAA" stroke-width="2" />
    <line x1="1600" y1="266" x2="1700" y2="266" stroke="#AAAAAA" stroke-width="3" />
    <line x1="1600" y1="533" x2="1700" y2="533" stroke="#AAAAAA" stroke-width="3" />
    
    <!-- Blue Station Small Details/Connectors -->
    <rect x="1600" y="260" width="20" height="12" fill="#888888" />
    <rect x="1600" y="527" width="20" height="12" fill="#888888" />

    <!-- Main Field Boundary -->
    <rect x="0" y="0" width="1600" height="800" fill="#FFFFFF" stroke="#000000" stroke-width="8" />

    <!-- Field Center Line -->
    <line x1="800" y1="0" x2="800" y2="800" stroke="#CCCCCC" stroke-width="4" />

    <!-- Vertical Zone Lines -->
    <!-- Red Zone Line -->
    <line x1="200" y1="-20" x2="200" y2="820" stroke="#FF0000" stroke-width="4" />
    <!-- Blue Zone Line -->
    <line x1="1400" y1="-20" x2="1400" y2="820" stroke="#0066FF" stroke-width="4" />

    <!-- ==================== RED SIDE ELEMENTS ==================== -->

    <!-- Red Black Goal (Middle Bottom Half) -->
    <g id="red-goal">
        <rect x="0" y="450" width="200" height="140" fill="#2A2A2A" />
        <line x1="0" y1="450" x2="200" y2="450" stroke="#FF0000" stroke-width="6" />
        <line x1="0" y1="590" x2="200" y2="590" stroke="#FF0000" stroke-width="6" />
        <path d="M 0 450 L 90 520 L 0 590 M 90 480 L 90 560 M 70 505 L 70 535 M 150 450 L 110 520 L 150 590" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.8" />
    </g>

    <!-- Red Inner Ball Box (Top Half) -->
    <rect x="0" y="150" width="90" height="135" fill="url(#ballPattern)" />
    <rect x="0" y="150" width="90" height="135" fill="none" stroke="#FF0000" stroke-width="6" />

    <!-- Red Outside Ball Box (Bottom Left) -->
    <rect x="-70" y="700" width="60" height="90" fill="#F0F0F0" stroke="#888888" stroke-width="3" />
    <rect x="-70" y="700" width="60" height="90" fill="url(#ballPattern)" />

    <!-- Red Platform -->
    <g id="red-platform" filter="url(#shadow)">
        <!-- Thick Red Vertical Track -->
        <rect x="435" y="-30" width="30" height="860" fill="#E60000" />
        <rect x="445" y="-30" width="10" height="860" fill="#800000" opacity="0.4" />
        
        <!-- Platform Base -->
        <rect x="360" y="200" width="180" height="400" fill="#A00000" stroke="#FF1A1A" stroke-width="6" rx="4" />
        <rect x="380" y="220" width="140" height="360" fill="#CC0000" rx="4" />
        
        <!-- Hexagon Support Frame/Bracket -->
        <rect x="385" y="325" width="130" height="150" fill="none" stroke="#DDDDDD" stroke-width="6" rx="10" opacity="0.7" />
        
        <!-- Hexagon Structures (Flat-Topped) -->
        <!-- Outer Light Gray Hexagon (R=55) -->
        <polygon points="422.5,352.4 477.5,352.4 505,400 477.5,447.6 422.5,447.6 395,400" fill="#B0B0B0" stroke="#888888" stroke-width="4" />
        <!-- Inner Dark Gray Hexagon (R=30) -->
        <polygon points="435,374 465,374 480,400 465,426 435,426 420,400" fill="#444444" stroke="#222222" stroke-width="3" />
    </g>

    <!-- Red Alliance Wall Labels -->
    <text x="-50" y="133" fill="#FF0000" font-family="Arial, sans-serif" font-weight="900" font-size="28" text-anchor="middle" dominant-baseline="middle">R1</text>
    <text x="-50" y="400" fill="#FF0000" font-family="Arial, sans-serif" font-weight="900" font-size="28" text-anchor="middle" dominant-baseline="middle">R2</text>
    <text x="-50" y="666" fill="#FF0000" font-family="Arial, sans-serif" font-weight="900" font-size="28" text-anchor="middle" dominant-baseline="middle">R3</text>

    <!-- ==================== BLUE SIDE ELEMENTS ==================== -->
    
    <!-- Blue Black Goal (Middle Top Half - Rotational Symmetry) -->
    <g id="blue-goal">
        <rect x="1400" y="210" width="200" height="140" fill="#2A2A2A" />
        <line x1="1400" y1="210" x2="1600" y2="210" stroke="#0066FF" stroke-width="6" />
        <line x1="1400" y1="350" x2="1600" y2="350" stroke="#0066FF" stroke-width="6" />
        <path d="M 1600 210 L 1510 280 L 1600 350 M 1510 240 L 1510 320 M 1530 265 L 1530 295 M 1450 210 L 1490 280 L 1450 350" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.8" />
    </g>

    <!-- Blue Inner Ball Box (Bottom Half) -->
    <rect x="1510" y="515" width="90" height="135" fill="url(#ballPattern)" />
    <rect x="1510" y="515" width="90" height="135" fill="none" stroke="#0066FF" stroke-width="6" />

    <!-- Blue Outside Ball Box (Top Right) -->
    <rect x="1610" y="10" width="60" height="90" fill="#F0F0F0" stroke="#888888" stroke-width="3" />
    <rect x="1610" y="10" width="60" height="90" fill="url(#ballPattern)" />

    <!-- Blue Platform -->
    <g id="blue-platform" filter="url(#shadow)">
        <!-- Thick Blue Vertical Track -->
        <rect x="1135" y="-30" width="30" height="860" fill="#0033CC" />
        <rect x="1145" y="-30" width="10" height="860" fill="#000066" opacity="0.4" />
        
        <!-- Platform Base -->
        <rect x="1060" y="200" width="180" height="400" fill="#0033A0" stroke="#3385FF" stroke-width="6" rx="4" />
        <rect x="1080" y="220" width="140" height="360" fill="#0044CC" rx="4" />
        
        <!-- Hexagon Support Frame/Bracket -->
        <rect x="1085" y="325" width="130" height="150" fill="none" stroke="#DDDDDD" stroke-width="6" rx="10" opacity="0.7" />
        
        <!-- Hexagon Structures (Flat-Topped) -->
        <!-- Outer Light Gray Hexagon (R=55) -->
        <polygon points="1122.5,352.4 1177.5,352.4 1205,400 1177.5,447.6 1122.5,447.6 1095,400" fill="#B0B0B0" stroke="#888888" stroke-width="4" />
        <!-- Inner Dark Gray Hexagon (R=30) -->
        <polygon points="1135,374 1165,374 1180,400 1165,426 1135,426 1120,400" fill="#444444" stroke="#222222" stroke-width="3" />
    </g>

    <!-- Blue Alliance Wall Labels -->
    <text x="1650" y="133" fill="#0066FF" font-family="Arial, sans-serif" font-weight="900" font-size="28" text-anchor="middle" dominant-baseline="middle">B3</text>
    <text x="1650" y="400" fill="#0066FF" font-family="Arial, sans-serif" font-weight="900" font-size="28" text-anchor="middle" dominant-baseline="middle">B2</text>
    <text x="1650" y="666" fill="#0066FF" font-family="Arial, sans-serif" font-weight="900" font-size="28" text-anchor="middle" dominant-baseline="middle">B1</text>


    <!-- ==================== CENTER BALL GRIDS ==================== -->
    
    <!-- Top Center Array (Width: 300 = 20 balls, Height: 240 = 16 balls) -->
    <g id="top-center-balls" filter="url(#shadow)">
        <rect x="650" y="110" width="300" height="240" fill="url(#ballPattern)" />
    </g>
    
    <!-- Bottom Center Array -->
    <g id="bottom-center-balls" filter="url(#shadow)">
        <rect x="650" y="450" width="300" height="240" fill="url(#ballPattern)" />
    </g>

</svg>